version: "3.9"

services:
  dokploy-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dokploy-dev
    image: dokploy-dev:local
    ports:
      - "47291:47291"   # 映射到主機的同埠
    volumes:
      - ./app:/app/app
      - ./blueprints:/app/blueprints
      - ./meta.json:/app/meta.json
    restart: unless-stopped

