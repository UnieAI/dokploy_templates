#! unieinfra.resource: 300GiB
version: '3.8'
services:
  unieinfra:
    image: registry.unieai.com/unieverse/uifw-one:latest
    volumes:
      - "./weight:/weight"
      - /sys:/sys:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /etc/unieai:/etc/unieai
    cap_add:
      - SYS_ADMIN
    runtime: nvidia
    environment:
    - NCCL_DEBUG=INFO
    - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    shm_size: 32gb
    command: [with-u010, uifw, serve, api_server, mistralai/Mixtral-8x7B-Instruct-v0.1, --server-port,
      '35640', --log-level, INFO, --model-name, Mixtral-8x7B-Instruct-v0.1, --session-len,
      '1024', --dtype, float16, --cache-max-entry-count, '0.1', --tp, '4']
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu
