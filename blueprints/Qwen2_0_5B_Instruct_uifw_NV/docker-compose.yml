#! unieinfra.resource: 4GiB
version: '3.8'
services:
  unieinfra:
    image: registry.unieai.com/unieverse-private/uifw2.cuda.s.048
    runtime: nvidia
    volumes: 
      - "./weight:/weight"  
    entrypoint: python3 -m uifw.launch_server
    command: ["--model-path", "Qwen/Qwen2-0.5B-Instruct", "--tp-size", "1", "--host", "0.0.0.0", "--port", "35640", "--enable-torch-compile"]