#! unieinfra.resource: 150GiB
version: '3.8'
services:
  unieinfra:
    image: registry.unieai.com/unieverse/uifw-one:latest
    volumes:
      # - "./weight:/weight"
      - /sys:/sys:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /etc/unieai:/etc/unieai:ro
    tmpfs:
      - /cache/hf
    cap_add:
      - SYS_ADMIN
    runtime: nvidia
    environment:
    - NCCL_DEBUG=INFO
    - NCCL_CROSS_NIC=0
    - NCCL_IB_DISABLE=1
    - NCCL_P2P_DISABLE=1
    - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HOME=/cache/hf
    - HUGGINGFACE_HUB_CACHE=/cache/hf/hub
    shm_size: 80gb
    command: [with-u010, uifw, serve, api_server, meta-llama/Llama-3.2-11B-Vision, --server-port, '35640',
      --log-level, INFO, --model-name, Llama-3.2-11B-Vision, --session-len, '1024', --tp, '2']
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu
