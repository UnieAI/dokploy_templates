#! unieinfra.resource: 50GiB
version: '3.8'
services:
  unieinfra:
    image: registry.unieai.com/unieverse/uifw-one:latest
    volumes:
      # - "./weight:/weight"
      - /sys:/sys:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /etc/unieai:/etc/unieai:ro
    tmpfs:
      - /cache/hf
    cap_add:
      - SYS_ADMIN
    runtime: nvidia
    environment:
    - NCCL_DEBUG=INFO
    - NCCL_CROSS_NIC=0
    - NCCL_IB_DISABLE=1
    - NCCL_P2P_DISABLE=1
    - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    - HF_HOME=/cache/hf
    - HUGGINGFACE_HUB_CACHE=/cache/hf/hub
    shm_size: 32gb
    command: [with-u010, uifw, serve, api_server, Qwen/Qwen3-30B-A3B, --server-port,
      '35640', --log-level, INFO, --model-name, Qwen3-30B-A3B, --enable-prefix-caching]
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu
