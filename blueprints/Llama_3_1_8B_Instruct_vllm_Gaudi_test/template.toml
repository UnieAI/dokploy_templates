[variables]
main_domain = "${domain}"
template_type = "model"

[config]
env = [
    "TEMPLATE_TYPE=${template_type}",
    "HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}",
    "MODEL_NAME=${MODEL_NAME}",
    "NUM_GPU=${NUM_GPU}",
    "MODEL_LENGTH=${MODEL_LENGTH}"
]
mounts = []

[[config.domains]]
serviceName = "unieinfra"
port = 8000
host = "${main_domain}"