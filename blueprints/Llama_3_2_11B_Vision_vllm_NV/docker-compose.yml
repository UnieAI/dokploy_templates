#! unieinfra.resource: 150GiB
version: '3.8'
services:
  unieinfra:
    image: vllm/vllm-openai:v0.9.1
    volumes:
    - "./weight:/weight"
    runtime: nvidia
    environment:
    - NCCL_SHM_DISABLE=1
    - NCCL_DEBUG=INFO
    - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    shm_size: 80gb
    entrypoint: vllm
    command: [serve, meta-llama/Llama-3.2-11B-Vision,
              --port, '8910',
              --host, 0.0.0.0,
              --tensor-parallel-size, '2',
              --served-model-name, test,
              --trust_remote_code,
              --enable-prefix-caching]
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu
