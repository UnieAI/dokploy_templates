#! unieinfra.resource: 24GiB
version: '3.8'
services:
  unieinfra:
    image: nctu6/uifw2.cuda.s.048
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_CONTEXT_LENGTH=${MODEL_CONTEXT_LENGTH}
      - NCCL_SHM_DISABLE=1
      - NCCL_DEBUG=INFO
      - CUDA_VISIBLE_DEVICES=0
    shm_size: 32gb
    entrypoint: uifw
    command: >
      serve api_server ${MODEL_NAME} 
      --server-port 35640 
      --log-level INFO
      --session-len ${MODEL_CONTEXT_LENGTH} 
      --dtype float16
      --cache-max-entry-count 0.1
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu
