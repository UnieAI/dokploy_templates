version: '3.8'
services:
  unieinfra:
    image: nctu6/uifw2.cuda.s.048
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_CONTEXT_LENGTH=${MODEL_CONTEXT_LENGTH}
      - NCCL_SHM_DISABLE=1
      - NCCL_DEBUG=INFO
      - CUDA_VISIBLE_DEVICES=0
    shm_size: 32gb
    entrypoint: python3 -m uifw.launch_server
    command: >
      --model-path ${MODEL_NAME} 
      --tp-size 1
      --host 0.0.0.0
      --port 35640
      --enable-torch-compile
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu