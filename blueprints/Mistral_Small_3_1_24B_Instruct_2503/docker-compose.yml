version: "3.8"

services:
  unieinfra:
    image: vllm/vllm-openai:latest
    runtime: nvidia  # Required for GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    ports:
      - "8000"
    environment:
      - NCCL_SHM_DISABLE=1  # Bypass shared memory transport
      - NCCL_DEBUG=INFO  # Enable detailed error logging
    shm_size: "8gb"
    entrypoint: vllm
    command: ["serve", "mistralai/Mistral-Small-3.1-24B-Instruct-2503", "--served-model-name", "Mistral_Small_3_1_24B_Instruct_2503"]
