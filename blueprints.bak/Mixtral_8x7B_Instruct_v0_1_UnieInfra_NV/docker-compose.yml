services:                                                                                                              
  mixtral_8x7B_instruct_v0.1:                                                                                                            
    image: registry.unieai.com/unieai/uifw2:357f1be
    volumes:                                                                                                           
      - "./weight:/weight"                                                                                                                                                                                            
    environment:                                                                                                       
      - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}                                                                                                                                                                              
    entrypoint: uifw                                                                                                   
    command: ["serve", "api_server", "mistralai/Mixtral-8x7B-Instruct-v0.1", 
              "--server-port", "35640", 
              "--log-level", "INFO", 
              "--model-name", "mistralai/Mixtral-8x7B-Instruct-v0.1", 
              "--eager-mode", 
              "--cache-max-entry-count", "0.4", 
              "--enable-prefix-caching", 
              "--dtype", "float16", 
              "--session-len", "16384"]                                                                            
    deploy:                                                                                                            
      resources:                                                                                                       
        reservations:                                                                                                  
          devices:                                                                                                     
            - driver: nvidia                                                                                           
              device_ids: ["0"]                                                                                        
              capabilities: [gpu]                                                                                      